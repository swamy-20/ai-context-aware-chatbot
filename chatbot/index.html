<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <!-- Modern Sans-Serif Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --user-msg: rgba(56, 189, 248, 0.15);
            --bot-msg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Floating Particles Background */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Top Header */
        .chat-header {
            padding: 24px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .header-avatar svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-info p {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-info p::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        /* Main Messages Area */
        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Scrollbar Styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message-wrapper {
            display: flex;
            gap: 15px;
            max-width: 85%;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .user-wrapper {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bot-wrapper {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .bot-avatar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
        }

        .user-avatar {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            padding: 16px 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.3px;
            word-wrap: break-word;
            position: relative;
        }

        /* User Message */
        .user-message {
            background: var(--user-msg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 18px 2px 18px 18px;
        }

        /* Bot Message */
        .bot-message {
            background: var(--bot-msg);
            border: 1px solid var(--glass-border);
            border-radius: 2px 18px 18px 18px;
            white-space: pre-wrap;
        }

        /* Intent Badge */
        .intent-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 4px 10px;
            background: rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
            border-radius: 20px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        /* Bottom Input Area */
        .chat-input-container {
            padding: 24px 30px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .chat-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            border-radius: 30px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .chat-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: translateX(-1px) translateY(1px);
        }

        .send-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 12px 25px rgba(56, 189, 248, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Dots Animation */
        .typing-indicator {
            display: none;
        }

        .typing-bubble {
            background: var(--bot-msg);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 2px 18px 18px 18px;
            display: inline-flex;
            gap: 6px;
        }

        .dot {
            height: 6px;
            width: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
            box-shadow: 0 0 8px var(--primary);
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.3;
            }

            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>

<body>

    <!-- Dynamic Particles -->
    <div class="particles" id="particles"></div>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-avatar">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
                </svg>
            </div>
            <div class="header-info">
                <h1>UV's ai</h1>
                <p>Online & Ready</p>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="chat-messages" id="messages-box">
            <div class="message-wrapper bot-wrapper">
                <div class="avatar bot-avatar">🤖</div>
                <div class="message bot-message">Hello! I'm your Intelligent Context-Aware Assistant. I'm equipped to
                    chat about AI, coding, fitness, psychology, and much more. How can I help you today?</div>
            </div>

            <!-- Typing indicator -->
            <div class="message-wrapper bot-wrapper typing-indicator" id="typing-indicator">
                <div class="avatar bot-avatar">🤖</div>
                <div class="typing-bubble">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>

        <!-- Input Box -->
        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" class="chat-input" placeholder="Message UV ai..." autocomplete="off">
            </div>
            <button id="send-btn" class="send-btn">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- Interface Logic -->
    <script>
        // Generate floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 8 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
            particle.style.animationDelay = (Math.random() * 20) + 's';
            particlesContainer.appendChild(particle);
        }

        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesBox = document.getElementById('messages-box');
        const typingIndicator = document.getElementById('typing-indicator');

        // Helper: Add a message bubble
        function appendMessage(text, sender, intent = null) {
            const wrapperDiv = document.createElement('div');
            wrapperDiv.classList.add('message-wrapper');
            wrapperDiv.classList.add(sender === 'user' ? 'user-wrapper' : 'bot-wrapper');

            const avatarDiv = document.createElement('div');
            avatarDiv.classList.add('avatar');
            avatarDiv.classList.add(sender === 'user' ? 'user-avatar' : 'bot-avatar');
            avatarDiv.innerText = sender === 'user' ? '👤' : '🤖';

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');

            // Add intent badge if it's a bot response and intent exists
            if (sender === 'bot' && intent && intent !== "unknown" && intent !== "general") {
                const badge = document.createElement('span');
                badge.classList.add('intent-badge');
                badge.innerText = intent;
                msgDiv.appendChild(badge);
                msgDiv.appendChild(document.createElement('br'));
            }

            // Append text content
            msgDiv.appendChild(document.createTextNode(text));

            wrapperDiv.appendChild(avatarDiv);
            wrapperDiv.appendChild(msgDiv);

            // Insert before typing indicator
            messagesBox.insertBefore(wrapperDiv, typingIndicator);
            scrollToBottom();
        }

        // Helper: Scroll to bottom
        function scrollToBottom() {
            setTimeout(() => {
                messagesBox.scrollTop = messagesBox.scrollHeight;
            }, 10);
        }

        // Send a message
        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, 'user');

            inputField.value = '';
            sendBtn.disabled = true;

            typingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                const response = await fetch("http://127.0.0.1:8001/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: text,
                        session_id: "default",
                        level: 3
                    })
                });

                typingIndicator.style.display = 'none';

                if (response.ok) {
                    const data = await response.json();
                    appendMessage(data.reply, 'bot', data.intent);
                } else {
                    const errorData = await response.json();
                    appendMessage("Server Error: " + (errorData.detail || "Unable to process request"), 'bot');
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Network Error: Could not connect to the AI server.", 'bot');
            } finally {
                sendBtn.disabled = false;
                inputField.focus();
                scrollToBottom();
            }
        }

        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

    </script>
</body>

</html>
